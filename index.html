<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homepage is Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{max-width:600px;padding:48px;border:1px solid #1a1a2e;border-radius:16px;background:#12121a;text-align:center}
h1{font-size:28px;background:linear-gradient(135deg,#7c5cfc,#00d4aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{color:#888;font-size:14px;margin-bottom:32px}
.status{background:#0d1f17;border:1px solid #134e2e;border-radius:8px;padding:16px;margin:24px 0}
.status .ok{color:#4ade80;font-weight:600;font-size:18px}
.info{color:#666;font-size:13px;margin-top:24px}
a{color:#7c5cfc}
</style>
</head>
<body>
<div class="card">
<h1>Loops Digital</h1>
<p class="sub">AI Visibility Reports Hub</p>
<div class="status">
<p class="ok">✓ GitHub Pages is live</p>
<p style="color:#aaa;margin-top:8px;font-size:14px">Claude can now deploy reports to this URL</p>
</div>
</div>
</body>
</html>
